name: Use Case - PROD

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'
jobs:
  usecase-test:
    environment: PROD
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env: # Shared environment variables in k6 scripts
      altinn_env: PROD
      apimSubsKey: ${{ secrets.APIM_SUBSKEY }}
      app: ${{ vars.APP }}
      org: ${{ vars.ORG }}
      pid: ${{ secrets.TESTIDP_TENOR_PID }}
      testidppwd: ${{ secrets.TESTIDP_PASSWORD }}
      encodedJwk: ${{ secrets.MP_ENCODEDJWK }}
      mpClientId: ${{ secrets.MP_CLIENT_ID }}
      mpKid: ${{ secrets.MP_KID }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: grafana/setup-k6-action@db07bd9765aac508ef18982e52ab937fe633a065 # v1.2.1
      - name: Run use case tests for endpoint 'applications'
        uses: grafana/run-k6-action@de51a7390bdf0ac85a3bef493691bd71d4c7c158 # v1.4.0
        with:
          path: test/k6/src/tests/applications.js
          inspect-flags: -e altinn_env=PROD # Supplies the value for pre-run validation, when env vars / flags are not yet defined

      - name: Run use case tests for endpoint 'instances'
        if: always()
        uses: grafana/run-k6-action@de51a7390bdf0ac85a3bef493691bd71d4c7c158 # v1.4.0
        with:
          path: test/k6/src/tests/instances.js
          inspect-flags: -e altinn_env=PROD # Supplies the value for pre-run validation, when env vars / flags are not yet defined

      - name: Run use case tests for endpoint 'instances/sbl'
        if: always()
        uses: grafana/run-k6-action@de51a7390bdf0ac85a3bef493691bd71d4c7c158 # v1.4.0
        with:
          path: test/k6/src/tests/messageboxinstances.js
          flags: -e apimSblSubsKey=${{ secrets.APIM_SBL_SUBSKEY }}
          inspect-flags: -e altinn_env=PROD # Supplies the value for pre-run validation, when env vars / flags are not yet defined
      - name: Run use case tests for endpoint 'data'
        if: always()
        uses: grafana/run-k6-action@de51a7390bdf0ac85a3bef493691bd71d4c7c158 # v1.4.0
        with:
          path: test/k6/src/tests/data.js
          inspect-flags: -e altinn_env=PROD -e app=${{ vars.APP }} # Supplies the value for pre-run validation, when env vars / flags are not yet defined
      - name: Run use case tests for endpoint 'process'
        if: always()
        uses: grafana/run-k6-action@de51a7390bdf0ac85a3bef493691bd71d4c7c158 # v1.4.0
        with:
          path: test/k6/src/tests/process.js
          inspect-flags: -e altinn_env=PROD # Supplies the value for pre-run validation, when env vars / flags are not yet defined
      - name: Run use case tests for endpoint 'sign'
        if: always()
        uses: grafana/run-k6-action@de51a7390bdf0ac85a3bef493691bd71d4c7c158 # v1.4.0
        with:
          path: test/k6/src/tests/sign.js
          inspect-flags: -e altinn_env=PROD # Supplies the value for pre-run validation, when env vars / flags are not yet defined
      - name: Run use case tests for endpoint 'texts'
        if: always()
        uses: grafana/run-k6-action@de51a7390bdf0ac85a3bef493691bd71d4c7c158 # v1.4.0
        with:
          path: test/k6/src/tests/texts.js
          inspect-flags: -e altinn_env=PROD # Supplies the value for pre-run validation, when env vars / flags are not yet defined
  slack-notify:
    if: failure()
    needs: usecase-test
    uses: ./.github/workflows/send-slack-warning.yml
    permissions: {}
    with:
      warning-message: 'Storage use case test failure in production'
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL_PROD }}
